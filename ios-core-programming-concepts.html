<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iOS 核心编程概念教程 · Core Programming Concepts</title>
  <style>
    :root {
      --bg: #eef1f6;
      --surface: #ffffff;
      --ink: #14141f;
      --muted: #5b6575;
      --line: #e3e7ef;
      --swift: #f05138;
      --editor: #0d1020;
      --editor-2: #161d33;
      --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      --ui: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--ui);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    #progress {
      position: fixed;
      inset: 0 auto auto 0;
      z-index: 100;
      width: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--swift), #ff8a5c);
    }

    .hero {
      color: #fff;
      background:
        radial-gradient(120% 90% at 84% -10%, rgba(240, 81, 56, .22), transparent 56%),
        linear-gradient(160deg, var(--editor), var(--editor-2));
      padding: 64px 24px 48px;
    }

    .hero-inner,
    .content {
      max-width: 960px;
      margin: 0 auto;
    }

    .eyebrow {
      margin-bottom: 16px;
      color: #7ec699;
      font: 13px var(--mono);
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(34px, 6vw, 58px);
      line-height: 1.05;
      letter-spacing: -.03em;
    }

    .accent { color: var(--swift); }
    .lede { max-width: 760px; color: #c4cbdb; font-size: 17px; }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 24px;
    }

    .meta span,
    .meta a {
      border: 1px solid rgba(255, 255, 255, .15);
      border-radius: 999px;
      padding: 5px 10px;
      color: #dce3ef;
      background: rgba(255, 255, 255, .06);
      font: 12px var(--mono);
      text-decoration: none;
    }

    .content { padding: 28px 20px 72px; }

    #article {
      padding: clamp(20px, 4vw, 38px);
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: 0 16px 48px rgba(15, 23, 42, .06);
    }

    #article h1 { font-size: 34px; }
    #article h2 {
      margin-top: 42px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
      font-size: 25px;
    }
    #article h3 { margin-top: 28px; font-size: 18px; }
    #article p, #article li { color: #374151; }
    #article blockquote {
      margin: 18px 0;
      padding: 12px 16px;
      border: 1px solid #f7cabd;
      border-left: 4px solid var(--swift);
      border-radius: 0 12px 12px 0;
      background: #fff4f1;
      color: #4a2418;
    }
    #article code {
      border-radius: 5px;
      padding: 2px 5px;
      background: #f3f4f6;
      font-family: var(--mono);
      font-size: .92em;
    }
    #article pre {
      overflow: auto;
      padding: 16px;
      border: 1px solid #252b45;
      border-radius: 14px;
      background: var(--editor);
      color: #e5e7eb;
      line-height: 1.6;
    }
    #article pre code { padding: 0; background: transparent; color: inherit; }
    #article table { width: 100%; border-collapse: collapse; margin: 18px 0; font-size: 14px; }
    #article th, #article td { padding: 10px; border: 1px solid var(--line); text-align: left; vertical-align: top; }
    #article th { background: #f8fafc; }
    #article a { color: #2563eb; }

    .state {
      padding: 34px 18px;
      color: var(--muted);
      text-align: center;
    }

    .state a { color: #2563eb; }

    footer {
      padding-top: 18px;
      color: #8a93a3;
      text-align: center;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="progress"></div>

  <header class="hero">
    <div class="hero-inner">
      <div class="eyebrow">// Core Programming Concepts · Swift / Objective-C 对照 · iOS 主干必学</div>
      <h1>iOS 核心编程概念<br /><span class="accent">系统教程</span></h1>
      <p class="lede">把 OOP、ARC、协议与 Delegate、闭包/Block、错误处理、并发、函数式编程和生命周期串成一条完整学习主线。</p>
      <div class="meta">
        <span>Markdown 为内容源</span>
        <span>HTML 动态渲染</span>
        <a href="docs/core-programming-concepts/README.md">查看 Markdown</a>
      </div>
    </div>
  </header>

  <main class="content">
    <article id="article">
      <div class="state">正在加载教程内容…</div>
    </article>
    <footer>iOS Learning · Core Programming Concepts</footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const article = document.getElementById('article');
    const sourcePath = 'docs/core-programming-concepts/README.md';

    async function renderTutorial() {
      try {
        const response = await fetch(sourcePath, { cache: 'no-cache' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const markdown = await response.text();
        article.innerHTML = marked.parse(markdown, {
          gfm: true,
          breaks: false
        });
      } catch (error) {
        article.innerHTML = `
          <div class="state">
            <h2>教程内容加载失败</h2>
            <p>请通过 GitHub Pages 或本地 HTTP 服务打开本页，避免直接使用 file:// 协议。</p>
            <p><a href="${sourcePath}">直接查看 Markdown 教程</a></p>
            <p><code>${String(error)}</code></p>
          </div>`;
      }
    }

    function updateProgress() {
      const root = document.documentElement;
      const max = root.scrollHeight - root.clientHeight;
      document.getElementById('progress').style.width = `${max > 0 ? root.scrollTop / max * 100 : 0}%`;
    }

    document.addEventListener('scroll', updateProgress, { passive: true });
    renderTutorial().finally(updateProgress);
  </script>
</body>
</html>
